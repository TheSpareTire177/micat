version: "3.9"

services:
  mc-permanent:
    image: itzg/minecraft-server:latest
    container_name: mc-permanent
    restart: unless-stopped
    environment:
      - EULA=TRUE
      - TYPE=FORGE
      # VERSION can be adjusted per your needs
      - VERSION=1.20.1
    ports:
      - "25565:25565"
    volumes:
      - ./data/mc-permanent:/data

  mc-seasonal:
    image: itzg/minecraft-server:latest
    container_name: mc-seasonal
    restart: unless-stopped
    environment:
      - EULA=TRUE
      - TYPE=FORGE
      - VERSION=1.20.1
    ports:
      - "25566:25565"
    volumes:
      - ./data/mc-seasonal:/data

  # Placeholder for the web management UI (e.g. WEBSURFACE)
  # web-ui:
  #   build: ../WEBSURFACE
  #   container_name: micat-web
  #   restart: unless-stopped
  #   ports:
  #     - "8080:80"

volumes: {}
